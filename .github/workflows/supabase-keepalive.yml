name: Supabase keep-alive

# Supabase pauzuje darmowy projekt po 7 dniach bez żadnego ruchu do API.
# Ten job raz dziennie strzela trywialne zapytanie do REST API, co resetuje
# licznik bezczynności — niezależnie od tego, czy ktoś używa aplikacji.

on:
  schedule:
    # Codziennie o 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          # URL i publishable (anon) key są bezpieczne do commitowania — patrz SUPABASE_SETUP.md.
          # RLS blokuje dostęp do danych; to zapytanie zwróci pustą tablicę, ale liczy się jako aktywność.
          curl --fail-with-body --silent --show-error \
            "https://xyvltgegptamtlzsdjwo.supabase.co/rest/v1/banks?select=id&limit=1" \
            -H "apikey: sb_publishable_7iJwmFOM5lUI4tOTzbYLcg_VVOS5CXF" \
            -H "Authorization: Bearer sb_publishable_7iJwmFOM5lUI4tOTzbYLcg_VVOS5CXF"
