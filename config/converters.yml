# Converters configuration
# Each converter has a unique ID and display name

converters:
  - id: santander_xml
    name: Santander XML (Wyciąg bankowy)
    description: Santander bank XML statements with AI-powered tenant extraction

  - id: pko_mt940
    name: PKO BP (MT940)
    description: PKO BP bank MT940 format statements with AI-powered tenant extraction

  - id: bnp_xml
    name: BNP Paribas XML (CAMT.053)
    description: BNP Paribas bank XML statements (ISO 20022 camt.053) with AI-powered tenant extraction

  - id: alior
    name: Alior Bank (MT940)
    description: Alior Bank MT940 format statements with AI-powered tenant extraction

  - id: pko_biznes
    name: PKO Biznes (ELIXIR ZIP)
    description: PKO Biznes ELIXIR CSV files in ZIP archive with AI-powered tenant extraction

  - id: pko_sa
    name: PKO SA (EXP)
    description: PKO SA bank export format (.exp) with AI-powered tenant extraction

  - id: ing
    name: ING Bank (MT940)
    description: ING Bank MT940 format statements with AI-powered tenant extraction

  - id: bos_xml
    name: BOŚ Bank XML (CAMT.052)
    description: Bank Ochrony Środowiska XML account reports (ISO 20022 camt.052) with AI-powered tenant extraction
